<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escanea CuidarIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="qr">
<div class="app" style="background:var(--p);color:#fff">
  <div class="page">
    <div class="flex-row">
      <span style="width:30px;height:30px;border-radius:9px;background:#fff"></span>
      <span style="font:700 19px/1 var(--hfont);color:#fff">CuidarIA</span>
    </div>

    <div>
      <div style="font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--acc)">MATERNIDAD · CUIDADO INTEGRAL</div>
      <h1 style="font:700 28px/1.2 var(--hfont);color:#fff;margin-top:10px">Apoyo para tu bebé y para ti</h1>
      <p style="font-size:15.5px;line-height:1.5;color:rgba(255,255,255,.9);margin-top:10px">Guías del recién nacido y bienestar emocional del cuidador, en un solo lugar.</p>
    </div>

    <div style="background:#fff;border-radius:28px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px">
      <img src="assets/img/qr.svg" width="190" height="190" alt="Código QR de acceso a CuidarIA" style="display:block;border-radius:8px">
      <div class="flex-row" style="font:700 15px/1.2 var(--hfont);color:var(--ink);text-align:center">
        <span class="ms" style="font-size:19px;color:var(--p)">photo_camera</span>Escanea con tu teléfono
      </div>
      <div class="flex-row" style="gap:7px">
        <span class="chip">MINSAL</span>
        <span class="chip">OMS</span>
        <span class="chip">UNICEF</span>
      </div>
    </div>

    <div class="mt-auto flex-row" style="justify-content:space-between;padding-top:16px;border-top:1px solid rgba(255,255,255,.25)">
      <span style="font-size:13px;color:rgba(255,255,255,.85)">Hospital / CESFAM ____________</span>
      <span style="font:700 13px/1 var(--bfont);color:#fff">Gratis</span>
    </div>
  </div>
</div>
</body>
</html>
