<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resultado del tamizaje — CuidarIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="screening-result">
<div class="app">
  <div class="page">
    <h1 style="font:700 21px/1.2 var(--hfont);color:var(--ink);margin:0">Gracias por completarlo</h1>

    <div class="result-banner">
      <div class="result-banner__label">NIVEL ACTUAL</div>
      <div class="result-banner__value" data-screening-level>Leve–moderado</div>
      <div class="result-banner__copy">Es normal sentir más carga en esta etapa. Aquí van algunas ideas de apoyo que pueden ayudarte esta semana.</div>
    </div>

    <div>
      <div class="field__label" style="margin-bottom:10px">Tu historial</div>
      <div class="bar-chart" style="height:110px">
        <div class="bar-chart__col"><div class="bar-chart__bar" style="height:38px"></div><span class="bar-chart__label">Sem 1</span></div>
        <div class="bar-chart__col"><div class="bar-chart__bar bar-chart__bar--warn" style="height:58px"></div><span class="bar-chart__label">Sem 2</span></div>
        <div class="bar-chart__col"><div class="bar-chart__bar bar-chart__bar--warn" style="height:70px"></div><span class="bar-chart__label bar-chart__label--active">Sem 3</span></div>
      </div>
    </div>

    <div class="alert alert--sec">
      <span class="ms">info</span>
      <div>Esto es un apoyo, no un diagnóstico clínico.</div>
    </div>

    <a href="wellbeing.html" class="btn btn-primary mt-auto">
      <span class="ms" style="font-size:19px">favorite</span>Ver ideas de apoyo
    </a>
  </div>
</div>
<script src="assets/js/main.js"></script>
<script>
  try {
    var level = sessionStorage.getItem('cuidaria_screening_level');
    if (level) document.querySelector('[data-screening-level]').textContent = level;
  } catch (e) { /* sessionStorage no disponible, se muestra el valor por defecto */ }
</script>
</body>
</html>
