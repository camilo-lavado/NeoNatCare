<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Crear cuenta — CuidarIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="register">
<div class="app">
  <div class="topbar">
    <a href="index.html" class="ms topbar__icon">arrow_back_ios_new</a>
    <div class="topbar__title">Crear cuenta</div>
  </div>

  <div class="page">
    <div class="text-center">
      <h1 class="headline" style="font-size:24px">Empecemos</h1>
      <p class="subhead" style="margin-top:6px">Crea tu cuenta para acompañar a tu bebé y registrar tu propio bienestar.</p>
    </div>

    <form class="field" style="gap:16px" data-consent-form data-redirect="register-baby.html">
      <div class="field">
        <label class="field__label" for="name">Nombre completo</label>
        <div class="field__control">
          <span class="ms">person</span>
          <input id="name" type="text" placeholder="Valentina Reyes" required autocomplete="name">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="reg-email">Correo</label>
        <div class="field__control">
          <span class="ms">mail</span>
          <input id="reg-email" type="email" placeholder="tucorreo@ejemplo.cl" required autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="reg-password">Contraseña</label>
        <div class="field__control">
          <span class="ms">lock</span>
          <input id="reg-password" data-password-input type="password" placeholder="Mínimo 8 caracteres" required minlength="8" autocomplete="new-password">
          <button type="button" data-password-toggle class="ms" aria-label="Mostrar contraseña">visibility</button>
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="reg-password-confirm">Confirmar contraseña</label>
        <div class="field__control">
          <span class="ms">lock</span>
          <input id="reg-password-confirm" data-password-input type="password" placeholder="Repite tu contraseña" required minlength="8" autocomplete="new-password">
          <button type="button" data-password-toggle class="ms" aria-label="Mostrar contraseña">visibility</button>
        </div>
      </div>

      <label class="consent">
        <span class="checkbox" data-checkbox data-required></span>
        <span class="consent__text">Acepto los <a href="#" style="color:var(--p);font-weight:700">Términos y condiciones</a> y la <a href="privacy.html" style="color:var(--p);font-weight:700">Política de privacidad</a>.</span>
      </label>

      <label class="consent consent--sensitive">
        <span class="checkbox" data-checkbox data-required></span>
        <span class="consent__text">Autorizo de forma <b>explícita y específica</b> el tratamiento de los datos de salud de mi bebé y de mi propio bienestar emocional (dato sensible, Ley 21.719), para recibir orientación clínica y contención personalizada. Puedo retirar esta autorización cuando quiera.</span>
      </label>

      <div class="form-error" data-consent-error style="display:none">
        Para continuar necesitamos que aceptes ambas casillas — incluida la autorización específica de datos de salud.
      </div>

      <button type="submit" class="btn btn-primary">Crear cuenta</button>
    </form>

    <a class="btn-link" style="text-align:center" href="login.html">Ya tengo cuenta · Ingresar</a>
  </div>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
