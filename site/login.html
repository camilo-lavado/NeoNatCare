<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ingresar — CuidarIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="login">
<div class="app">
  <div class="page">
    <div style="display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:8px">
      <span class="avatar-circle" style="width:56px;height:56px;border-radius:18px;background:var(--p)"></span>
      <div class="text-center">
        <h1 class="headline" style="font-size:26px">Hola de nuevo</h1>
        <p class="subhead" style="margin-top:6px">Ingresa para seguir tu bitácora y la de Lucas</p>
      </div>
    </div>

    <form class="field" style="gap:16px;margin-top:6px" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="field">
        <label class="field__label" for="email">Correo</label>
        <div class="field__control">
          <span class="ms">mail</span>
          <input id="email" type="email" value="valentina@correo.cl" autocomplete="email">
        </div>
      </div>

      <div class="field">
        <label class="field__label" for="password">Contraseña</label>
        <div class="field__control">
          <span class="ms">lock</span>
          <input id="password" data-password-input type="password" value="12345678" autocomplete="current-password">
          <button type="button" data-password-toggle class="ms" aria-label="Mostrar contraseña">visibility</button>
        </div>
      </div>

      <div class="checkbox-row">
        <label class="checkbox-row__option">
          <span class="checkbox is-checked"></span>
          Recordarme
        </label>
        <a class="btn-link" style="padding:0" href="#">¿Olvidaste tu clave?</a>
      </div>

      <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>

    <div class="flex-row" style="color:var(--ink2);font-size:13px">
      <span class="flex-1" style="height:1px;background:var(--border)"></span>o<span class="flex-1" style="height:1px;background:var(--border)"></span>
    </div>

    <a class="btn btn-secondary" href="dashboard.html">Crear una cuenta nueva</a>
    <p class="text-center" style="font-size:12px;color:var(--ink2);margin-top:4px">Tus datos de salud y bienestar están protegidos y cifrados</p>
  </div>
</div>
<script src="assets/js/main.js"></script>
</body>
</html>
